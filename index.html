<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화학요법제학 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d; --sf:#141414; --sf2:#1c1c1c; --sf3:#222;
  --br:#2a2a2a; --br2:#333;
  --gold:#c9a84c; --gold2:#e8c97a; --gdim:rgba(201,168,76,0.12);
  --w:#f5f0e8; --w2:#c8c0b0; --w3:#7a7060;
  --gn:#4caf82; --gnbg:rgba(76,175,130,0.1);
  --rd:#cf6679; --rdbg:rgba(207,102,121,0.1);
  --r:10px; --rl:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--w);min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.007) 2px,rgba(255,255,255,0.007) 4px);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:0 24px 80px;}

/* HEADER */
header{padding:40px 0 28px;border-bottom:1px solid var(--br);margin-bottom:36px;display:flex;align-items:flex-end;justify-content:space-between;}
.logo-en{font-family:'Playfair Display',serif;font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:6px;}
.logo-ko{font-size:22px;font-weight:700;color:var(--w);letter-spacing:-0.5px;}
.logo-school{font-size:12px;color:var(--w2);letter-spacing:0.3px;margin-top:8px;}
.logo-made{font-size:10px;color:var(--w3);margin-top:2px;letter-spacing:0.5px;}
.hline{width:40px;height:1px;background:var(--gold);opacity:.5;align-self:center;}

/* NAV */
.nav-tabs{display:flex;border-bottom:1px solid var(--br);margin-bottom:36px;}
.nav-tab{padding:12px 28px;font-size:13px;font-weight:500;color:var(--w3);cursor:pointer;border:none;background:none;font-family:'Noto Sans KR',sans-serif;letter-spacing:.5px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;}
.nav-tab.active{color:var(--gold2);border-bottom-color:var(--gold);}
.nav-tab:hover:not(.active){color:var(--w2);}

/* PAGE */
.page{display:none;}
.page.active{display:block;animation:fu .3s ease;}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* CONFIG */
.config-block{border:1px solid var(--br);border-radius:var(--rl);padding:20px 24px;margin-bottom:28px;background:var(--sf);}
.config-title{font-size:10px;letter-spacing:2px;color:var(--w3);text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:14px;}
.config-row{display:flex;gap:24px;flex-wrap:wrap;align-items:center;}
.cfg-lbl{font-size:11px;color:var(--w3);letter-spacing:.5px;white-space:nowrap;min-width:48px;}
.chip-grp{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:6px 14px;border-radius:4px;border:1px solid var(--br2);background:transparent;color:var(--w3);font-size:12px;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
.chip:hover{border-color:var(--gold);color:var(--gold2);}
.chip.on{background:var(--gdim);border-color:var(--gold);color:var(--gold2);}
.cfg-div{width:1px;height:24px;background:var(--br);flex-shrink:0;}

/* QUIZ CARD */
.quiz-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--rl);padding:32px;margin-bottom:16px;position:relative;}
.quiz-card::before{content:'';position:absolute;top:0;left:24px;right:24px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;}
.quiz-tags{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
.qtag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.8px;padding:3px 9px;border-radius:3px;border:1px solid;}
.qtag-s{border-color:rgba(201,168,76,.3);color:var(--gold);background:var(--gdim);}
.qtag-f{border-color:var(--br2);color:var(--w3);}
.qtag-a{border-color:rgba(201,168,76,.2);color:#a89060;}
.quiz-q{font-size:17px;font-weight:500;line-height:1.7;color:var(--w);margin-bottom:28px;letter-spacing:-.2px;}
.dhl{color:var(--gold2);font-weight:700;}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:flex-start;gap:14px;padding:15px 18px;background:var(--sf2);border:1px solid var(--br);border-radius:var(--r);cursor:pointer;transition:all .15s;text-align:left;width:100%;font-family:'Noto Sans KR',sans-serif;}
.opt:hover:not(:disabled){border-color:var(--br2);background:var(--sf3);}
.opt-n{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--w3);min-width:18px;margin-top:2px;flex-shrink:0;}
.opt-t{font-size:14px;line-height:1.65;color:var(--w2);}
.opt.sel{border-color:var(--gold);background:var(--gdim);}
.opt.sel .opt-n{color:var(--gold);}
.opt.sel .opt-t{color:var(--w);}
.opt.correct{border-color:rgba(76,175,130,.5);background:var(--gnbg);}
.opt.correct .opt-n{color:var(--gn);}
.opt.correct .opt-t{color:#a8dfc4;}
.opt.wrong{border-color:rgba(207,102,121,.4);background:var(--rdbg);}
.opt.wrong .opt-n{color:var(--rd);}
.opt.wrong .opt-t{color:#f0a8b4;}
.opt:disabled{cursor:default;}
.sel-counter{margin-top:12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--w3);text-align:right;transition:color .2s;}
.sel-counter.ready{color:var(--gold);}

/* BTN ROW */
.btn-row{display:flex;gap:10px;justify-content:flex-end;}
.btn{padding:11px 26px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid;font-family:'Noto Sans KR',sans-serif;letter-spacing:.3px;}
.btn-p{background:var(--gold);color:#1a1200;border-color:var(--gold);}
.btn-p:hover:not(:disabled){background:var(--gold2);border-color:var(--gold2);}
.btn-p:disabled{opacity:.35;cursor:default;}
.btn-g{background:transparent;color:var(--w2);border-color:var(--br2);}
.btn-g:hover{border-color:var(--w3);color:var(--w);}

/* RESULT PANEL */
.rp{display:none;margin-top:18px;border-radius:var(--r);border:1px solid;overflow:hidden;animation:fu .25s ease;}
.rp.show{display:block;}
.rp-head{padding:14px 20px;display:flex;align-items:center;gap:10px;}
.rp.pass{border-color:rgba(76,175,130,.3);}
.rp.fail{border-color:rgba(207,102,121,.25);}
.rp.pass .rp-head{background:var(--gnbg);border-bottom:1px solid rgba(76,175,130,.2);}
.rp.fail .rp-head{background:var(--rdbg);border-bottom:1px solid rgba(207,102,121,.2);}
.r-icon{font-size:16px;font-weight:700;}
.rp.pass .r-icon{color:var(--gn);}
.rp.fail .r-icon{color:var(--rd);}
.r-verd{font-size:14px;font-weight:600;}
.rp.pass .r-verd{color:#a8dfc4;}
.rp.fail .r-verd{color:#f0a8b4;}
.rp-body{padding:18px 20px;background:var(--sf);}
.expl-sec{margin-bottom:14px;}
.expl-lbl{font-size:10px;letter-spacing:1.5px;color:var(--w3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;margin-bottom:8px;}
.expl-it{display:flex;gap:10px;padding:10px 14px;border-radius:6px;margin-bottom:6px;background:var(--sf2);border-left:2px solid;}
.expl-it.w-it{border-left-color:var(--rd);}
.expl-it.c-it{border-left-color:var(--gn);}
.ex-num{font-family:'JetBrains Mono',monospace;font-size:11px;flex-shrink:0;margin-top:1px;}
.w-it .ex-num{color:var(--rd);}
.c-it .ex-num{color:var(--gn);}
.ex-txt{font-size:13px;color:var(--w2);line-height:1.5;margin-bottom:4px;}
.ex-why{font-size:12px;color:var(--w3);line-height:1.5;}
.ex-why strong{color:var(--gold);font-weight:500;}

/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:28px;}
.s-inp{flex:1;background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:13px 18px;font-size:14px;color:var(--w);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;}
.s-inp::placeholder{color:var(--w3);}
.s-inp:focus{border-color:var(--gold);}
.btn-s{padding:13px 22px;background:var(--gold);color:#1a1200;border:1px solid var(--gold);border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;}
.btn-s:hover{background:var(--gold2);}
.list-lbl{font-size:10px;letter-spacing:2px;color:var(--w3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;margin-bottom:14px;}
.dlist{display:flex;flex-direction:column;gap:4px;}
.drow{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--sf);border:1px solid var(--br);border-radius:8px;cursor:pointer;transition:all .15s;}
.drow:hover{border-color:var(--gold);background:var(--gdim);}
.drow-nm{font-size:13px;font-weight:500;color:var(--w);}
.drow-mt{font-size:11px;color:var(--w3);font-family:'JetBrains Mono',monospace;}

/* SEARCH RESULT */
.s-res{display:none;}
.s-res.show{display:block;animation:fu .25s ease;}
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--w3);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-bottom:20px;padding:0;transition:color .15s;}
.back-btn:hover{color:var(--gold2);}

/* DRUG CARD */
.dc{background:var(--sf);border:1px solid var(--br);border-radius:var(--rl);overflow:hidden;}
.dc-top{padding:28px 28px 22px;border-bottom:1px solid var(--br);display:flex;gap:20px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;}
.dc-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;color:var(--w);letter-spacing:-.3px;line-height:1.2;}
.dc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.dtag{font-size:11px;padding:3px 10px;border-radius:3px;border:1px solid;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;}
.dtag-s{border-color:rgba(201,168,76,.3);color:var(--gold);background:var(--gdim);}
.dtag-f{border-color:var(--br2);color:var(--w3);}
.dtag-r{border-color:rgba(76,175,130,.3);color:var(--gn);background:rgba(76,175,130,.08);}
.struct-box{background:var(--sf2);border:1px solid var(--br);border-radius:8px;padding:12px 14px;text-align:center;min-width:130px;flex-shrink:0;}
.struct-box img{max-width:150px;max-height:100px;display:block;filter:invert(.9) sepia(.05);}
.struct-msg{font-size:11px;color:var(--w3);font-family:'JetBrains Mono',monospace;}
.dc-body{padding:24px 28px;}
.pb{margin-bottom:22px;}
.pb:last-child{margin-bottom:0;}
.pb-head{font-size:10px;letter-spacing:2px;color:var(--gold);font-family:'JetBrains Mono',monospace;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.pb-head::after{content:'';flex:1;height:1px;background:var(--br);}
.pb-items{display:flex;flex-direction:column;gap:6px;}
.pb-it{font-size:13.5px;color:var(--w2);line-height:1.65;padding-left:16px;position:relative;}
.pb-it::before{content:'';position:absolute;left:4px;top:10px;width:4px;height:1px;background:var(--w3);}
.no-res{text-align:center;padding:60px;color:var(--w3);font-size:14px;}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div>
    <div class="logo-en">Chemotherapy Pharmacology</div>
    <div class="logo-ko">화학요법제학 퀴즈</div>
    <div class="logo-school">전남대학교 약대 24학번</div>
    <div class="logo-made">made by 김우혁</div>
  </div>
  <div class="hline"></div>
</header>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('quiz',this)">퀴즈</button>
  <button class="nav-tab" onclick="switchTab('search',this)">약물 검색</button>
</div>

<!-- QUIZ PAGE -->
<div id="page-quiz" class="page active">
  <div class="config-block">
    <div class="config-title">// 퀴즈 설정</div>
    <div class="config-row">
      <span class="cfg-lbl">섹터</span>
      <div class="chip-grp" id="sector-chips"></div>
      <div class="cfg-div"></div>
      <span class="cfg-lbl">정답 수</span>
      <div class="chip-grp">
        <div class="chip on" data-ans="random" onclick="pickAns(this)">랜덤</div>
        <div class="chip" data-ans="1" onclick="pickAns(this)">1개</div>
        <div class="chip" data-ans="2" onclick="pickAns(this)">2개</div>
      </div>
    </div>
  </div>

  <div class="quiz-card">
    <div class="quiz-tags" id="quiz-tags"></div>
    <div class="quiz-q" id="quiz-q">아래 버튼을 눌러 문제를 시작하세요.</div>
    <div class="opts" id="opts"></div>
    <div class="sel-counter" id="sel-counter"></div>
    <div class="rp" id="rp">
      <div class="rp-head">
        <span class="r-icon" id="r-icon"></span>
        <span class="r-verd" id="r-verd"></span>
      </div>
      <div class="rp-body" id="r-body"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-g" onclick="generateQuiz()">새 문제</button>
    <button class="btn btn-p" id="btn-sub" onclick="submitAnswer()" disabled>제출하기</button>
  </div>
</div>

<!-- SEARCH PAGE -->
<div id="page-search" class="page">
  <div class="search-bar">
    <input class="s-inp" id="s-inp" type="text" placeholder="약물명 검색 (예: Vancomycin, Artemisinin...)" onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn-s" onclick="doSearch()">검색</button>
  </div>

  <div id="s-default">
    <div class="list-lbl">// 전체 약물 목록</div>
    <div class="dlist" id="all-list"></div>
  </div>

  <div class="s-res" id="s-res">
    <button class="back-btn" onclick="goBack()"><span>←</span> 목록으로</button>
    <div id="drug-detail"></div>
  </div>
</div>

</div>

<script>
// ============================================================
// DB
// ============================================================
const DB={
  "합성항균제":{
    "Sulfonamide (계열 공통)":{family:"Sulfonamide",routes:["경구투여"],mechanism:["세균의 dihydropteroate synthase의 기질인 PABA와 경쟁 → folic acid 유도체 합성 억제","thymidine 합성 차단 → DNA 합성 억제","합성항균제 계열, DHF 합성 저해 기전"],pk:["위장관 흡수 good: 경구투여","장기형: 90% 이상의 높은 혈장단백질 결합 → 과민반응의 원인"],ae:["가장 흔한 부작용: 피부발진의 과민반응","장기형: 스티븐스-존슨 증후군 (발생률 1%)","신생아: 빌리루빈과 경쟁 → 핵황달","BBB 통과, 태반통과, 모유로 분비 → 임산부/수유모 투약 위험군"],indication:[],misc:[]},
    "Sulfisoxazole":{family:"Sulfonamide 단기형",routes:["경구투여"],mechanism:["PABA와 경쟁 → folic acid 유도체 합성 억제 → DNA 합성 억제"],pk:["단기형, 반감기 4-7시간, 1일 4회 투여"],ae:["감염·난용성·요로결석 잘 생김","피부발진 과민반응"],indication:[],misc:["단기형 Sulfonamide에 해당한다."]},
    "Sulfadiazine":{family:"Sulfonamide 단기형",routes:["경구투여"],mechanism:["PABA와 경쟁 → folic acid 유도체 합성 억제 → DNA 합성 억제"],pk:["단기형, 반감기 4-7시간, 1일 4회 투여"],ae:["피부발진 과민반응"],indication:[],misc:["단기형 Sulfonamide에 해당한다."]},

    "Sulfapyridine":{family:"Sulfonamide 장기형",routes:["경구투여"],mechanism:["PABA와 경쟁 → folic acid 유도체 합성 억제 → DNA 합성 억제"],pk:["장기형, 반감기 40시간, 1일 1회 투여","흡수 빠르고 배설 늦어, 유효혈중농도 지속시간 길다"],ae:["스티븐스-존슨 증후군 가능성 → 장기복용 금지"],indication:[],misc:["장기형 Sulfonamide에 해당한다."]},

    "Trimethoprim":{family:"Diaminopyrimidine",routes:["경구투여"],mechanism:["Dihydrofolate reductase 억제 → tetrahydrofolic acid 합성 차단 → DNA 합성 저해","세균 효소에 강력한 선택적 독성","인간의 folate reductase에도 친화성 일부 → 약간의 독성"],pk:["경구투여가 가능하다."],ae:["골수억제가 나타날 수 있다."],indication:["요로감염 치료에 사용된다.","설사 치료에 사용된다.","기관지염 치료에 사용된다."],misc:["Sulfamethoxazole과 5:1 복합 = Bactrim","SMZ 병용: THF 합성 연속 두 단계 차단 + 내성균 출현 억제 → 약효 상승","혈중농도비 20:1이 항균력 가장 높음"]}

function allDrugs(){const l=[];for(const[s,ds] of Object.entries(DB))for(const[n,d] of Object.entries(ds))l.push({sector:s,name:n,data:d});return l;}
function toSentence(text,cat){
  const t=text.trim();
  // 이미 서술식
  if(t.endsWith('다')||t.endsWith('음')||t.endsWith('함')||t.endsWith('임')||t.endsWith('됨')||t.endsWith('X')||t.endsWith('O')||t.endsWith('.')) return t;
  if(t.includes('→')) return t;
  // 투여경로만 자동 변환
  if(cat==='투여경로'){
    if(t.includes('경구')) return '경구투여가 가능하다.';
    if(t.includes('정맥')||t.includes('IV')) return '정맥주사로 투여한다.';
    if(t.includes('근육')||t.includes('IM')) return '근육주사로 투여한다.';
    if(t.includes('외용')||t.includes('국소')) return '외용(국소)으로 투여한다.';
    return t+'로 투여한다.';
  }
  return t;
}
function getProps(d){const p=[];const a=(arr,c)=>(arr||[]).forEach(s=>{if(s.trim())p.push({text:toSentence(s,c),cat:c});});a(d.mechanism,'기전');a(d.pk,'약동학');a(d.ae,'부작용');a(d.indication,'적응증');a(d.misc,'기타');a(d.routes,'투여경로');return p;}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function rInt(n){return Math.floor(Math.random()*n);}

// 상태
// ============================================================
let selSec='all', selAns='random', cq=null, submitted=false, picked=new Set();

function buildSectorChips(){
  const el=document.getElementById('sector-chips');
  let h=`<div class="chip on" data-s="all" onclick="pickSec(this)">전체</div>`;
  Object.keys(DB).forEach(s=>{h+=`<div class="chip" data-s="${s}" onclick="pickSec(this)">${s}</div>`;});
  el.innerHTML=h;
}
function pickSec(el){document.querySelectorAll('[data-s]').forEach(c=>c.classList.remove('on'));el.classList.add('on');selSec=el.dataset.s;}
function pickAns(el){document.querySelectorAll('[data-ans]').forEach(c=>c.classList.remove('on'));el.classList.add('on');selAns=el.dataset.ans;}
function targetDrugs(){const a=allDrugs();return selSec==='all'?a:a.filter(d=>d.sector===selSec);}

// ============================================================
// 퀴즈 생성
// ============================================================
function generateQuiz(){
  submitted=false; picked.clear();
  document.getElementById('rp').className='rp';
  document.getElementById('btn-sub').disabled=true;
  document.getElementById('sel-counter').textContent='';

  const drugs=targetDrugs();
  if(drugs.length<4){alert('섹터에 약물이 부족합니다.');return;}

  const ansCount= selAns==='random'?(Math.random()<0.5?1:2):parseInt(selAns);

  // 전체 약물에서 각 텍스트의 출현 빈도 계산 (공유 특성 필터링용)
  const allDrugsList = allDrugs();
  const textFreq = new Map();
  allDrugsList.forEach(d=>{
    getProps(d.data).forEach(p=>{
      textFreq.set(p.text, (textFreq.get(p.text)||0)+1);
    });
  });
  // 3개 이상 약물에 등장하는 텍스트 = 공유 특성 → 오답으로 쓰면 안 됨
  const SHARED_THRESHOLD = 3;
  const sharedTexts = new Set([...textFreq.entries()].filter(([,c])=>c>=SHARED_THRESHOLD).map(([t])=>t));

  let drug,props,tries=0;
  do{drug=drugs[rInt(drugs.length)];props=getProps(drug.data);tries++;}
  while(props.length<ansCount+1&&tries<20);
  if(props.length<ansCount+1){generateQuiz();return;}

  // 정답 선지: 공유 특성도 정답으로는 OK (해당 약물의 실제 특성이니까)
  const correctProps=shuffle(props).slice(0,ansCount);

  // 오답 선지: 정답 약물 전체 특성 + 공유 특성 모두 제외
  const allCorrectTexts = new Set(props.map(p=>p.text));
  const others=shuffle(allDrugsList.filter(d=>d.name!==drug.name));
  const wrongPool=[];
  const usedText=new Set(correctProps.map(p=>p.text));
  for(const od of others.slice(0,20)){
    getProps(od.data).forEach(p=>{
      if(
        !usedText.has(p.text) &&
        !allCorrectTexts.has(p.text) &&
        !sharedTexts.has(p.text)  // ← 공유 특성 제외
      ){
        wrongPool.push({...p,src:od.name,srcSec:od.sector});
        usedText.add(p.text);
      }
    });
    if(wrongPool.length>=(5-ansCount)*4)break;
  }
  const wrongProps=shuffle(wrongPool).slice(0,5-ansCount);
  if(wrongProps.length<5-ansCount){generateQuiz();return;}

  const allOpts=shuffle([
    ...correctProps.map(p=>({text:p.text,isAns:true,src:drug.name})),
    ...wrongProps.map(p=>({text:p.text,isAns:false,src:p.src,srcSec:p.srcSec}))
  ]);
  const ansIdx=allOpts.map((o,i)=>o.isAns?i:-1).filter(i=>i>=0);

  cq={drug,allOpts,ansIdx,ansCount};

  // 렌더 — 태그에 정답 개수 노출 없음
  const nums=['①','②','③','④','⑤'];
  document.getElementById('quiz-tags').innerHTML=`
    <span class="qtag qtag-s">${drug.sector}</span>
    <span class="qtag qtag-f">${drug.data.family}</span>`;

  // 발문: 랜덤=모두고르시오(개수비공개), 1개/2개=개수명시
  const verb = selAns==='random'
    ? '옳은 것을 <strong>모두</strong> 고르시오.'
    : `옳은 것을 <strong>${ansCount}개</strong> 고르시오.`;
  document.getElementById('quiz-q').innerHTML=`다음 중 <span class="dhl">${drug.name}</span>에 대해 ${verb}`;

  // 초기 제출 버튼: 랜덤은 1개 이상 선택 시 활성 → 처음엔 비활성
  document.getElementById('btn-sub').disabled=true;

  document.getElementById('opts').innerHTML=allOpts.map((o,i)=>`
    <button class="opt" id="opt-${i}" onclick="toggleOpt(this,${i})">
      <span class="opt-n">${nums[i]}</span>
      <span class="opt-t">${o.text}</span>
    </button>`).join('');
}

function updateCounter(){
  const c=document.getElementById('sel-counter');
  if(!cq){c.textContent='';return;}
  if(selAns==='random'){
    // 랜덤: 몇 개 골랐는지만 표시
    c.textContent=picked.size>0?`${picked.size}개 선택됨`:'';
    c.className='sel-counter'+(picked.size>0?' ready':'');
  } else {
    // 고정: N/M 카운터
    if(cq.ansCount===1){c.textContent='';return;}
    const n=picked.size,total=cq.ansCount;
    c.textContent=`${n} / ${total} 선택`;
    c.className='sel-counter'+(n===total?' ready':'');
  }
}

function toggleOpt(el,idx){
  if(submitted||!cq)return;
  if(selAns==='random'){
    // 랜덤: 자유롭게 토글, 최소 1개 이상이면 제출 가능
    if(picked.has(idx)){picked.delete(idx);el.classList.remove('sel');}
    else{picked.add(idx);el.classList.add('sel');}
    document.getElementById('btn-sub').disabled=picked.size===0;
  } else if(cq.ansCount===1){
    document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
    picked.clear(); el.classList.add('sel'); picked.add(idx);
    document.getElementById('btn-sub').disabled=false;
  } else {
    if(picked.has(idx)){picked.delete(idx);el.classList.remove('sel');}
    else if(picked.size<cq.ansCount){picked.add(idx);el.classList.add('sel');}
    document.getElementById('btn-sub').disabled=picked.size!==cq.ansCount;
  }
  updateCounter();
}

function submitAnswer(){
  if(!cq||submitted)return;
  submitted=true;
  const ansSet=new Set(cq.ansIdx);
  // 랜덤이든 고정이든 채점 기준은 동일: 고른 것이 정답 집합과 정확히 일치
  const ok=[...picked].every(i=>ansSet.has(i))&&picked.size===ansSet.size;
  const nums=['①','②','③','④','⑤'];

  document.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true; b.classList.remove('sel');
    if(ansSet.has(i))b.classList.add('correct');
    else if(picked.has(i))b.classList.add('wrong');
  });

  const rp=document.getElementById('rp');
  rp.className=`rp show ${ok?'pass':'fail'}`;
  document.getElementById('r-icon').textContent=ok?'✓':'✗';
  document.getElementById('r-verd').textContent=ok?'정답입니다!':'오답입니다.';

  let body='';

  // 틀린 선지 해설
  const wrongPicked=[...picked].filter(i=>!ansSet.has(i));
  if(wrongPicked.length>0){
    body+=`<div class="expl-sec"><div class="expl-lbl">// 내가 고른 오답</div>`;
    wrongPicked.forEach(i=>{
      const o=cq.allOpts[i];
      body+=`<div class="expl-it w-it">
        <span class="ex-num">${nums[i]}</span>
        <div>
          <div class="ex-txt">${o.text}</div>
          <div class="ex-why">→ 이 내용은 <strong>${o.src}</strong>의 특성입니다. <strong>${cq.drug.name}</strong>에는 해당하지 않습니다.</div>
        </div></div>`;
    });
    body+=`</div>`;
  }

  // 놓친 정답
  const missed=cq.ansIdx.filter(i=>!picked.has(i));
  if(missed.length>0){
    body+=`<div class="expl-sec"><div class="expl-lbl">// 놓친 정답</div>`;
    missed.forEach(i=>{
      const o=cq.allOpts[i];
      body+=`<div class="expl-it c-it">
        <span class="ex-num">${nums[i]}</span>
        <div>
          <div class="ex-txt">${o.text}</div>
          <div class="ex-why">→ <strong>${cq.drug.name}</strong>의 특성입니다.</div>
        </div></div>`;
    });
    body+=`</div>`;
  }

  // 모든 오답 선지 출처 (항상 표시)
  const wrongAll=cq.allOpts.map((o,i)=>({...o,i})).filter(o=>!o.isAns);
  body+=`<div class="expl-sec"><div class="expl-lbl">// 오답 선지 출처</div>`;
  wrongAll.forEach(o=>{
    body+=`<div class="expl-it w-it">
      <span class="ex-num">${nums[o.i]}</span>
      <div>
        <div class="ex-txt">${o.text}</div>
        <div class="ex-why">→ 실제로는 <strong>${o.src}</strong> (${o.srcSec||''})의 특성</div>
      </div></div>`;
  });
  body+=`</div>`;

  document.getElementById('r-body').innerHTML=body;
  document.getElementById('btn-sub').disabled=true;
  document.getElementById('sel-counter').textContent='';
}

// ============================================================
// 검색
// ============================================================
function buildAllList(){
  document.getElementById('all-list').innerHTML=allDrugs().map(d=>`
    <div class="drow" onclick="showDrug('${d.name.replace(/'/g,"\\'")}')">
      <span class="drow-nm">${d.name}</span>
      <span class="drow-mt">${d.sector}</span>
    </div>`).join('');
}

function doSearch(){
  const q=document.getElementById('s-inp').value.trim().toLowerCase();
  if(!q){goBack();return;}
  const matches=allDrugs().filter(d=>d.name.toLowerCase().includes(q)||(d.data.family||'').toLowerCase().includes(q));
  document.getElementById('s-default').style.display='none';
  const res=document.getElementById('s-res');
  res.classList.add('show');
  if(matches.length===0){document.getElementById('drug-detail').innerHTML='<div class="no-res">검색 결과가 없습니다.</div>';return;}
  if(matches.length===1){renderDrugDetail(matches[0]);return;}
  document.getElementById('drug-detail').innerHTML=`
    <div class="list-lbl" style="margin-bottom:14px">${matches.length}개 결과</div>
    <div class="dlist">${matches.map(d=>`
      <div class="drow" onclick="showDrug('${d.name.replace(/'/g,"\\'")}')">
        <span class="drow-nm">${d.name}</span><span class="drow-mt">${d.sector}</span>
      </div>`).join('')}</div>`;
}

function showDrug(name){
  const drug=allDrugs().find(d=>d.name===name);
  if(!drug)return;
  document.getElementById('s-default').style.display='none';
  document.getElementById('s-res').classList.add('show');
  renderDrugDetail(drug);
}

function renderDrugDetail(drug){
  const safeName=drug.name.replace(/[^a-zA-Z0-9]/g,'_');
  const sec=(title,arr)=>{
    if(!arr||!arr.length)return'';
    return`<div class="pb"><div class="pb-head">${title}</div><div class="pb-items">${arr.map(s=>`<div class="pb-it">${s}</div>`).join('')}</div></div>`;
  };
  document.getElementById('drug-detail').innerHTML=`
    <div class="dc">
      <div class="dc-top">
        <div>
          <div class="dc-name">${drug.name}</div>
          <div class="dc-tags">
            <span class="dtag dtag-s">${drug.sector}</span>
            <span class="dtag dtag-f">${drug.data.family||''}</span>
            ${(drug.data.routes||[]).map(r=>`<span class="dtag dtag-r">${r}</span>`).join('')}
          </div>
        </div>
        <div class="struct-box" id="struct-${safeName}"><div class="struct-msg">로딩중...</div></div>
      </div>
      <div class="dc-body">
        ${sec('작용기전 / 특성',drug.data.mechanism)}
        ${sec('약물동태',drug.data.pk)}
        ${sec('부작용',drug.data.ae)}
        ${sec('적응증',drug.data.indication)}
        ${sec('기타',drug.data.misc)}
      </div>
    </div>`;
  loadStruct(drug.name, safeName);
}

function goBack(){
  document.getElementById('s-default').style.display='';
  document.getElementById('s-res').classList.remove('show');
  document.getElementById('drug-detail').innerHTML='';
  document.getElementById('s-inp').value='';
}

async function loadStruct(name,safe){
  const el=document.getElementById(`struct-${safe}`);
  if(!el)return;
  const eng=name.match(/[A-Za-z][A-Za-z0-9\s\-]*/)?.[0]?.trim();
  if(!eng||eng.length<3){el.innerHTML='<div class="struct-msg">구조식 없음</div>';return;}
  const img=new Image();
  img.onload=()=>{el.innerHTML='';img.style.cssText='max-width:150px;max-height:100px;filter:invert(.9) sepia(.05)';el.appendChild(img);};
  img.onerror=()=>{el.innerHTML='<div class="struct-msg">구조식 없음</div>';};
  img.src=`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(eng)}/PNG?image_size=200x120`;
}

// ============================================================
// 탭
// ============================================================
function switchTab(tab,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  el.classList.add('active');
}

// init
buildSectorChips();
buildAllList();
generateQuiz();
</script>
